<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Page not found — Rinalds Dērics</title>
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0F0F0F">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#0F0F0F; --ink:#F4F1EA; --ink-dim:rgba(244,241,234,.6); --clay:#B5663F; }

      background:var(--bg); color:var(--ink); font-family:"Inter",sans-serif;
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
      justify-content:center; text-align:center; padding:40px; gap:8px;
    }
    .code {
      font-family:"Archivo Black",sans-serif; font-size:clamp(5rem,22vw,13rem);
      line-height:.9; color:transparent; -webkit-text-stroke:2px var(--clay);
    }
    h1 { font-family:"Archivo Black",sans-serif; font-size:clamp(1.3rem,4vw,2rem);
         text-transform:uppercase; margin-top:18px; }
    p { color:var(--ink-dim); max-width:36ch; margin:12px 0 30px; }
    a.home {
      font-size:.82rem; font-weight:700; letter-spacing:.14em; text-transform:uppercase;
      text-decoration:none; color:#0F0F0F; background:var(--clay); padding:16px 32px;
    }
    a.home:hover { background:#CC7548; }
  </style>
</head>
<body>
  <p class="code">404</p>
